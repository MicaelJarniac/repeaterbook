repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v5.0.0'
    hooks:
    -   id: check-toml
    -   id: check-yaml
        exclude: ^mkdocs\.yml$
    -   id: check-json
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: requirements-txt-fixer
-   repo: local
    hooks:
    -   id: repeaterbook-write-schema
        name: regenerate RepeaterSpec JSON schema
        entry: repeaterbook-write-schema
        language: system
        files: ^src/repeaterbook/mcp/(models\.py|schemas/repeater_spec\.schema\.json)$
        pass_filenames: false
        stages: [pre-commit]
